services:

  backend:
    build: .
    container_name: resume_backend

    ports:
      - "8000:8000"

    volumes:
      - .:/app

    env_file:
      - .env

    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:17

    container_name: resume_postgres

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: resume_builder

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine

    container_name: resume_redis

    ports:
      - "6379:6379"

volumes:
  postgres_data: